sections:
  - type: "services"
    data:
      heading: "What We Design"
      services:
        - name: "Wedding Floral Design"
          description: "Ceremony arches, reception centerpieces, bouquets, boutonnieres, and personal flowers. We limit ourselves to one wedding per weekend so every event gets our full attention."
        - name: "Event Installations & Centerpieces"
          description: "Corporate events, galas, and private parties. Large-scale installations or intimate table arrangements -- scaled to your space and budget."
        - name: "Funeral & Memorial Arrangements"
          description: "Thoughtful, beautiful arrangements for difficult moments. Same-day delivery available for Orlando and Winter Park."
        - name: "Weekly Fresh Arrangements"
          description: "Standing orders for restaurants, hotels, and offices. Fresh seasonal flowers delivered weekly, arranged on-site."

