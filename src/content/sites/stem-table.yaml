  - type: "about"
    data:
      heading: "About the Studio"
      bio: "Stem & Table is a boutique floral studio on Fairbanks Avenue in Winter Park. Owner Lauren Hartwell has been designing for Central Florida weddings since 2017, working primarily with seasonal and locally grown flowers.\n\nWe limit ourselves to one wedding per weekend so every event gets our full attention. If it's not in season, we'll tell you -- and suggest something better."
      ownerName: "Lauren Hartwell"
      ownerTitle: "Owner & Lead Designer"
      image: "https://images.unsplash.com/photo-1508610048659-a06b669e3321?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Seasonal Availability & Instant Quoting"
      description: "Select your colors, style, and wedding date. Our system shows what's in season, suggests arrangement options, and generates a ballpark quote before your first consultation. No guesswork, no sticker shock."

  - type: "testimonials"
    data:
      heading: "Kind Words"
      testimonials:
        - quote: "Lauren understood exactly what we wanted before we could even articulate it. The flowers were the best part of our wedding."
          name: "Sarah & Tom B."
          role: "Wedding clients"
        - quote: "We use Stem & Table for our restaurant's weekly arrangements. Always fresh, always perfect, never late."
          name: "Chef Daniel M."
          role: "Thornton Park restaurant"
        - quote: "She told us the peonies we wanted wouldn't be in season for our date and suggested ranunculus instead. She was right -- they were stunning."
          name: "Ashley R."
          role: "Spring wedding"

  - type: "contact"
    data:
      heading: "Let's Talk Flowers"
      subheading: "Consultations are complimentary. Tell us about your event and we'll start building your vision."
