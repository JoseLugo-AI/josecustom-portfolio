          alt: "Minimalist line work"

  - type: "services"
    data:
      heading: "Services"
      services:
        - name: "Custom Tattoo Design"
          description: "All styles -- traditional, fine line, blackwork, watercolor, realism. Every piece is designed specifically for you. No flash walls, no walk-ins."
        - name: "Cover-Ups & Reworks"
          description: "Turning old or unwanted tattoos into something you're proud of. We'll assess what's possible and design around what's there."
        - name: "Fine Art Prints"
          description: "Original artwork from our artists available as prints. The studio doubles as a small gallery with rotating shows."
        - name: "Private Bookings"
          description: "Full-day sessions for larger pieces. Just you and your artist, no distractions."

  - type: "about"
    data:
      heading: "The Artists"
      bio: "Still Water is a two-artist studio on Orange Avenue in Ivanhoe Village. Artists Reina Torres and James Oku focus on custom work only.\n\nEvery piece starts with a consultation where we learn what you want and why. We book 3-4 weeks out because we don't stack clients. The studio doubles as a small gallery showing original work from local artists on a rotating basis."
      image: "https://images.unsplash.com/photo-1598452963314-b09f397a5c48?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Visual Reference Builder"
      description: "Describe your idea in words, and our tool generates a mood board with style references, color palettes, and composition options for your artist to work from. Better starting point, faster path to a design you love."

  - type: "contact"
    data:
      heading: "Start the Conversation"
      subheading: "Tell us what you're thinking. We'll get back to you within 48 hours with next steps."
