    data:
      heading: "The Lineup"
      services:
        - name: "Signature Hot Sauces (6 Varieties)"
          description: "From our everyday habanero-mango to the limited-edition Carolina Reaper blend. Every bottle is small-batch, cooked in our Mills 50 kitchen."
        - name: "Online Store & Nationwide Shipping"
          description: "Order direct from us. Flat-rate shipping anywhere in the US. Gift packs and subscription boxes available."
        - name: "Wholesale for Restaurants & Retailers"
          description: "Currently in 40+ stores across Central Florida. Custom volume pricing for restaurants, specialty shops, and grocery chains."
        - name: "Custom Private-Label Sauces"
          description: "Want your restaurant's own branded hot sauce? We'll develop the recipe and produce it. Your label, our kitchen."

