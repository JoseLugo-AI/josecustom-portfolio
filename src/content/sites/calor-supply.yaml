  - type: "about"
    data:
      heading: "Our Story"
      bio: "Calor started at the Mills 50 farmers market in 2021 with one habanero-mango sauce and a folding table. Three years later we're in 40+ stores across Central Florida and shipping nationwide.\n\nEvery batch is cooked in our commercial kitchen on Virginia Drive. We grow our own peppers when the season allows and source the rest from Florida farms. No extract, no gimmick flavors, no skull on the label."
      image: "https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Smart Product Descriptions & Inventory Sync"
      description: "Our system writes product copy in our brand voice for every new sauce and seasonal release, then syncs inventory counts across Shopify, Amazon, and our wholesale portal in real time. One update, everywhere at once."

  - type: "contact"
    data:
      heading: "Get in Touch"
      subheading: "Wholesale inquiries, custom label requests, or just want to say hey -- drop us a line."
