  - type: "about"
    data:
      heading: "The Shop"
      bio: "Iron & Asphalt has been building and restoring bikes and cars out of our SoDo garage since 2016. Owner Marco Reyes spent 10 years turning wrenches at dealerships before going independent.\n\nWe do everything in-house -- fabrication, paint, electrical, engine work. No subcontractors, no runaround. You talk to the person who's building your machine."
      ownerName: "Marco Reyes"
      ownerTitle: "Owner & Lead Builder"
      image: "https://images.unsplash.com/photo-1621905252507-b35492cc74b4?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Photo Estimate Tool"
      description: "Customers upload photos of their vehicle, and our system generates a preliminary repair estimate with parts pricing before they ever step into the shop. Faster quotes, fewer wasted trips."

  - type: "testimonials"
    data:
      heading: "From Our Clients"
      testimonials:
        - quote: "Marco took my grandfather's old Honda from a rusted frame to a showroom piece. The attention to detail is insane."
          name: "Carlos R."
          role: "Restoration client"
        - quote: "Honest shop. They told me what I actually needed, not what would run up the bill. Hard to find that."
          name: "James K."
          role: "Regular maintenance"

  - type: "contact"
    data:
      heading: "Bring It In"
      subheading: "Walk-ins welcome for estimates. Custom builds start with a conversation."
