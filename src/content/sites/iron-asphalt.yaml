sections:
  - type: "services"
    data:
      heading: "What We Do"
      services:
        - name: "Custom Motorcycle Builds & Restorations"
          description: "Ground-up builds and full restorations. Cafe racers, bobbers, scramblers, or whatever you've got in mind. Your vision, our hands."
        - name: "Performance Tuning & Dyno Testing"
          description: "Carburetor tuning, ECU mapping, exhaust upgrades, and dyno runs to prove the numbers. We tune for real-world riding, not just peak numbers."
        - name: "Paint & Bodywork"
          description: "Custom paint jobs, tank art, and bodywork -- all done in-house. No farming out, no waiting on third parties."
        - name: "Maintenance & Repair"
          description: "Oil changes to full engine rebuilds. All makes, all models. Bring it in, we'll tell you straight what it needs."

