  - type: "services"
    data:
      heading: "What We Host"
      services:
        - name: "Private Events (40-120 Guests)"
          description: "Full venue rental with flexible floor plans. Tables, chairs, linens, sound system, and a dedicated event coordinator included."
        - name: "Corporate Dinners & Offsites"
          description: "Board meetings, client dinners, team celebrations. AV setup, breakout areas, and catering coordination handled."
        - name: "Wedding Receptions & Rehearsal Dinners"
          description: "The backdrop your photographer will love. We work with your planner or provide our own coordinator."
        - name: "Full-Service Bar & Catering Coordination"
          description: "In-house bar service with custom cocktail menus. We'll connect you with our preferred catering partners or work with yours."

  - type: "about"
    data:
      heading: "The Story"
      bio: "The Eola Parlor is a renovated 1940s building two blocks from Lake Eola in Thornton Park. We kept the original hardwood floors and exposed brick and added the sound, lighting, and kitchen infrastructure to host real events.\n\nWe're not a banquet hall -- we're a room with character that your guests will actually remember. Owners David and Nina Chen handle every booking personally."
      ownerName: "David & Nina Chen"
      ownerTitle: "Owners"
      image: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "24/7 Booking Assistant"
      description: "Inquiries come in at all hours. Our AI assistant responds instantly with availability, pricing packages, and venue specs -- then hands off to our team for the personal touch. No inquiry sits unanswered overnight."

  - type: "contact"
    data:
      heading: "Plan Your Event"
      subheading: "Tell us your date and guest count. We'll get back to you within 24 hours."
