  - type: "about"
    data:
      heading: "About Dr. Whitfield"
      bio: "Vero Aesthetics is a physician-led med spa on Park Avenue in Winter Park. Dr. Sarah Whitfield, board-certified in family medicine with advanced aesthetics training, opened Vero in 2022 with a focus on natural-looking results.\n\nNo sales pressure, no package upsells during your appointment. We do free consultations because we'd rather you feel confident before you spend a dollar."
      ownerName: "Dr. Sarah Whitfield"
      ownerTitle: "Medical Director"
      image: "https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Smart Consultation & Treatment Matching"
      description: "Answer a short skin assessment online, and our system recommends treatment options based on your goals, skin type, and budget -- with realistic timelines and expected results. Book your appointment already knowing what to expect."

  - type: "testimonials"
    data:
      heading: "What Clients Say"
      testimonials:
        - quote: "Dr. Whitfield talked me out of filler I didn't need and suggested a peel instead. Saved me money and I looked better. That's rare."
          name: "Jennifer H."
          role: "Regular client"
        - quote: "The most relaxing med spa experience I've had. No hard sell, no awkward pressure. Just good work."
          name: "Amanda R."
          role: "Botox client"
        - quote: "I was nervous about my first time getting filler. She explained everything and let me decide. Results were exactly what I wanted."
          name: "Christina M."
          role: "First-time client"

  - type: "contact"
    data:
      heading: "Book Your Consultation"
      subheading: "Free consultations for all new clients. Let's talk about what you're looking for."
