sections:
  - type: "services"
    data:
      heading: "Treatments"
      services:
        - name: "Botox & Dermal Fillers"
          description: "Precise placement for natural results. We enhance what's there -- we don't change who you are. All injections performed by Dr. Whitfield."
        - name: "Laser Skin Resurfacing"
          description: "Address fine lines, sun damage, and uneven tone with medical-grade laser technology. Customized treatment plans for your skin type."
        - name: "IV Hydration Therapy"
          description: "Vitamin-infused IV drips for energy, recovery, and immunity. Walk in tired, walk out recharged. No appointment needed."
        - name: "Chemical Peels & Facials"
          description: "Medical-grade peels and customized facials. From maintenance to correction, matched to your skin's specific needs."

