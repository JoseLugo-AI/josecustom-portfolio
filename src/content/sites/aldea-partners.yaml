sections:
  - type: "services"
    data:
      heading: "Our Services"
      services:
        - name: "Tax Preparation"
          description: "Individual and business returns. We handle everything from simple W-2s to multi-entity business filings. E-file included, always."
        - name: "Bookkeeping & Monthly Financials"
          description: "Monthly reconciliation, P&L statements, and balance sheets. You run your business -- we keep the books clean."
        - name: "Business Entity Formation"
          description: "LLC, S-Corp, C-Corp -- we'll help you pick the right structure and file the paperwork. Includes first-year tax planning."
        - name: "IRS Representation & Resolution"
          description: "Got a letter from the IRS? Don't panic. We handle audits, payment plans, and penalty abatement on your behalf."

  - type: "features"
    data:
      heading: "Why Work With Us"
      features:
        - title: "Bilingual Service"
          description: "We speak English and Spanish. Your comfort level matters when we're talking about your money."
          icon: "users"
        - title: "Same-Day Callbacks"
          description: "Leave a message, get a call back within one business day. Every time."
          icon: "clock"
        - title: "No Billing for Quick Questions"
          description: "Quick question about a receipt or deduction? Just call. We don't nickel-and-dime."
          icon: "check"
        - title: "Year-Round Availability"
          description: "Tax season is busy, but we're here January through December. Your business doesn't stop in April."
          icon: "calendar"

  - type: "about"
    data:
      heading: "About the Firm"
      bio: "Aldea & Partners is a three-person CPA firm in downtown Orlando founded by Maria Aldea, CPA. We work primarily with small business owners, freelancers, and self-employed professionals who've outgrown TurboTax but don't need a Big Four firm.\n\nWe speak English and Spanish, return calls within a business day, and don't bill for quick questions. Tax season is busy, but we're here year-round."
      ownerName: "Maria Aldea, CPA"
      ownerTitle: "Founding Partner"
      image: "https://images.unsplash.com/photo-1573496799652-408c2ac9fe98?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Secure Document Intake & Extraction"
      description: "Clients upload tax documents to our encrypted portal. Our AI extracts key data, pre-fills preparation worksheets, and flags missing documents -- all before the first meeting. Less back-and-forth, faster turnaround."

  - type: "contact"
    data:
      heading: "Schedule a Consultation"
      subheading: "First consultation is free. Bring your questions -- we'll bring straight answers."
