sections:
  - type: "services"
    data:
      heading: "What We Carry"
      services:
        - name: "Curated Streetwear"
          description: "Independent and international brands you won't find at the mall. Small-run Japanese labels, independent UK designers, and emerging domestic brands."
        - name: "Vintage & Deadstock Sneakers"
          description: "Authenticated pre-owned and deadstock kicks. We verify everything in-house. No fakes, no exceptions."
        - name: "Local Artist Collabs & Exclusives"
          description: "Limited releases designed with Orlando artists. Screen-printed tees, embroidered caps, and one-off pieces you can only get here."
        - name: "Online Shop & Nationwide Shipping"
          description: "Full catalog online with flat-rate shipping. New drops announced on Instagram before they hit the floor."

