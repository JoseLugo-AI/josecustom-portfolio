  - type: "about"
    data:
      heading: "The Shop"
      bio: "Foreign Exchange is an independent streetwear and sneaker shop on Mills Avenue. Owner Tariq Williams opened the store in 2021 after years of reselling online and at Orlando sneaker conventions.\n\nWe carry brands you won't find at the mall -- small-run Japanese labels, independent UK designers, and collabs with Orlando artists. Everything in the store is hand-picked. If we wouldn't wear it, we don't stock it."
      ownerName: "Tariq Williams"
      ownerTitle: "Owner & Buyer"
      image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Style Recommendations & Drop Alerts"
      description: "Our system learns what you like based on past purchases and browsing, then sends personalized alerts when new drops match your style. No spam, no generic newsletters -- just the pieces you'd actually want."

  - type: "contact"
    data:
      heading: "Visit the Shop"
      subheading: "Open Tuesday through Saturday, 11am to 7pm. Sunday 12-5. Closed Mondays."
