sections:
  - type: "services"
    data:
      heading: "What We Bake"
      services:
        - name: "Fresh-Baked Bread & Pastries"
          description: "Sourdough, ciabatta, brioche, croissants, and seasonal pastries. Daily rotation -- we bake what's right for the day, not what's left from yesterday."
        - name: "Custom Cake Orders"
          description: "Weddings, birthdays, and everything in between. Every cake is designed and decorated in-house. Two weeks notice for custom orders."
        - name: "Catering Platters"
          description: "Pastry trays, bread baskets, and dessert spreads for your office, event, or party. We deliver anywhere in East Orlando."
        - name: "Weekend Brunch Service"
          description: "Saturday and Sunday, 8am to 1pm. Fresh pastries, egg dishes, and our house-made jams. No reservations needed."

