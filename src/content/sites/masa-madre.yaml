  - type: "about"
    data:
      heading: "Our Story"
      bio: "Masa Madre started in 2019 out of a home kitchen on Curry Ford Road. What began as sourdough loaves sold at the Audubon Park Market grew into a full bakehouse serving East Orlando.\n\nEverything is mixed, shaped, and baked on-site every morning. We source flour from Florida mills when we can and never use preservatives. If it's on the shelf, it was made today."
      image: "https://images.unsplash.com/photo-1556217477-d325251ece38?w=600&q=80"

  - type: "ai-feature"
    data:
      heading: "Powered by AI"
      title: "Smart Inventory & Order Forecasting"
      description: "Our system tracks daily sales patterns, seasonal demand, and custom order volume to predict exactly how much to prep each morning. Less waste, fewer sellouts, better margins."

  - type: "testimonials"
    data:
      heading: "What Our Neighbors Say"
      testimonials:
        - quote: "Best sourdough in Orlando. I drive across town for it every Saturday."
          name: "Maria C."
          role: "Curry Ford regular"
        - quote: "They did our wedding cake and it was perfect. Simple, elegant, and actually tasted incredible."
          name: "David & Priya T."
          role: "Wedding clients"
        - quote: "The brunch pastries are unreal. My kids ask to go here every weekend."
          name: "Jason W."
          role: "Local dad"

  - type: "contact"
    data:
      heading: "Come See Us"
      subheading: "Stop by the bakehouse or drop us a line for custom orders and catering."
